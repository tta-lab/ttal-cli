#:schema https://ttal.guion.io/schema/config.schema.json

references_path = "~/code/references"

[sync]
  worker_agent_paths = ["./docs/agents"]

[teams.default]
  team_path = ""                     # Path to your workspace (e.g. ~/ttal-workspace)
  data_dir = "~/.ttal"
  taskrc = "~/.taskrc"
  voice_language = "en"
  default_runtime = "claude-code"
  agent_model = "sonnet"
  worker_model = "sonnet"
  emoji_reactions = true
  # notification_token_env = "DEFAULT_NOTIFICATION_BOT_TOKEN"

# Telegram bot tokens and human chat IDs go in ~/.config/ttal/.env, not here.
# Convention: {UPPER_AGENT}_BOT_TOKEN=<telegram_token>
# Convention: {UPPER_HUMAN_ALIAS}_CHAT_ID=<telegram chat ID>
# Run 'ttal doctor --fix' to generate a template .env file.
