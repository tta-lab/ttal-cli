#:schema https://ttal.guion.io/schema/config.schema.json

[flicknote]
  inline_projects = ["plan", "fix"]

[sync]
  skills_paths = ["./docs/skills"]
  subagents_paths = ["./docs/agents"]
  commands_paths = ["./docs/commands"]

[prompts]
design = """\
Write an implementation plan for this task.
Read the task first: ttal task get {{task-id}}

Save plan to: docs/plans/YYYY-MM-DD-<topic>.md in the project repo.
When done: task {{task-id}} annotate 'Plan: docs/plans/<filename>.md'
Then tag-swap: task {{task-id}} modify -brainstorm -design +planned"""

execute = """\
Implement this task following any referenced plan.
Read the task first: ttal task get {{task-id}}
Follow the plan step by step: read, make changes, verify, commit.
Use ttal pr create for pull requests."""

triage = """\
PR review posted. Read it, assess and fix what's actionable.
Post your triage update with ttal pr comment create when done.
If verdict is LGTM and no remaining issues, merge with: ttal pr merge"""

review = """\
Review PR #{{pr-number}} — "{{pr-title}}" in {{owner}}/{{repo}} (branch: {{branch}}).
Scope: ONLY changes in this PR diff, not the entire codebase.
Post your review with: ttal pr comment create "<markdown>"
End with VERDICT: NEEDS_WORK or VERDICT: LGTM."""

re_review = """\
Worker has pushed fixes addressing your review.{{coder-comment}}
Re-review the changes: {{review-scope}}
Post updated review with: ttal pr comment create "<markdown>"
End with VERDICT: NEEDS_WORK or VERDICT: LGTM."""

[teams.default]
  chat_id = "YOUR_TELEGRAM_CHAT_ID"  # Get from @userinfobot on Telegram
  team_path = ""                     # Path to your workspace (e.g. ~/ttal-workspace)
  data_dir = "~/.ttal"
  taskrc = "~/.taskrc"
  voice_language = "en"
  worker_runtime = "claude-code"
  agent_model = "sonnet"
  worker_model = "sonnet"
  emoji_reactions = true
  # notification_token_env = "DEFAULT_NOTIFICATION_BOT_TOKEN"

# Bot tokens go in ~/.config/ttal/.env, not here.
# Convention: {UPPER_AGENT}_BOT_TOKEN=<telegram_token>
# Run 'ttal doctor --fix' to generate a template .env file.
