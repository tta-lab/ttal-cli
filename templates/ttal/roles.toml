[default]
prompt = """Read the task and do your best based on the context.
ttal task get {{task-id}}"""

[designer]
prompt = """{{skill:sp-writing-plans}}
{{skill:flicknote-cli}}
Write an implementation plan for this task.
Read the task first: ttal task get {{task-id}}

Storage: Save the plan via flicknote add 'content' --project ttal.plans
Iterate with: flicknote get <id> --tree, flicknote replace <id> --section <section-id>
When done: annotate the task with the flicknote hex ID: task {{task-id}} annotate '<hex-id>'
Then tag-swap: task {{task-id}} modify -brainstorm -design -research +planned"""

[researcher]
prompt = """{{skill:sp-research}}
{{skill:flicknote-cli}}
Research this topic thoroughly.
Read the task first: ttal task get {{task-id}}

Storage: Save findings via flicknote add 'content' --project ttal.research
Iterate with: flicknote get <id> --tree, flicknote append <id> 'more content', flicknote replace <id> --section <section-id>
When done: annotate the task with the flicknote hex ID: task {{task-id}} annotate '<hex-id>'"""

[fixer]
prompt = """{{skill:sp-debugging}}
{{skill:sp-writing-plans}}
{{skill:flicknote-cli}}
You operate in dual mode. Read the task first, then pick the right mode:

**Mode selection:**
- Task has +bugfix tag, or describes a bug/error/regression → **Bugfix mode** (use sp-debugging skill)
- Task has +feature or +refactor tag, or describes a small feature/improvement → **Designer mode** (use sp-writing-plans skill)

Read the task: ttal task get {{task-id}}

**Bugfix mode:** Diagnose root cause → write fix plan → save to flicknote
**Designer mode:** Investigate codebase → write implementation plan → save to flicknote

When done: annotate the task with the flicknote hex ID: task {{task-id}} annotate '<hex-id>'
Tag as planned: task {{task-id}} modify -bugfix -feature -refactor +planned"""

[manager]
prompt = """{{skill:task-route}}
Apply this routing framework to the task.
Read the task first: ttal task get {{task-id}}
Then classify and route it."""

# heartbeat_interval = "1h"

heartbeat_prompt = """{{skill:task-route}}
Pick a task from today's list and make progress.
Run: ttal today list and pick one.
Then apply the routing framework to decide: ask / brainstorm / research / design / execute."""
