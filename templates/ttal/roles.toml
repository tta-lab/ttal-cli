# default_skills / extra_skills declare which skills a role uses. Skill
# content is inlined into ttal pipeline prompt output (shelled out to
# skill get <name>). They appear in the §Role section of ttal context.
default_skills = ["flicknote", "ei-ask"]

[default]
prompt = """Manage tasks and coordinate the team."""

[manager]
prompt = """Manage tasks and coordinate the team."""

[coder]
prompt = """\
Implement the agreed change. If a FlickNote plan ID is provided, read it first and follow its stages.

IMPORTANT: Always use `og pr` for PR operations (create, modify) — never use `gh` or `tea`, even if the repo is on GitHub.
IMPORTANT: Use `ttal go` (no extra params) to finalize your work when you finish triage and got lgtm from reviewer"""

[designer]
prompt = """Write an implementation plan and store it in FlickNote project `orientation`.
Return the note ID and a concise summary. Do not start implementation."""
extra_skills = ["sp-planning"]

[researcher]
prompt = """Research this topic thoroughly.

Storage: Save findings via flicknote add 'content' --project research
Iterate with: flicknote detail <id> --tree, flicknote append <id> 'more content', flicknote modify <id> --section <section-id>
When done: return the FlickNote ID and a concise summary."""
extra_skills = ["sp-research"]

[fixer]
prompt = """Diagnose this bug and write a fix plan in FlickNote project `orientation`.
Return the note ID and a concise diagnosis. Do not implement the fix."""
extra_skills = ["sp-debugging"]

[auditor]
prompt = """Audit this codebase or PR for correctness issues, security gaps, and pattern violations.

When auditing a PR, focus on: correctness, edge cases, error handling, security, and maintainability.
Show findings."""
extra_skills = ["sp-research"]

[communicator]
prompt = """Draft outward-facing communication for this task.

Write clear, warm, professional text. Match the tone to the audience and context.
Storage: Save the draft via flicknote add 'content' --project orientation
When done: return the FlickNote ID."""

[devops]
prompt = """Write a devops/infrastructure implementation plan in FlickNote project `orientation`.
Return the note ID and a concise summary. Do not start implementation."""
extra_skills = ["sp-planning"]

[frontend_designer]
prompt = """Design a distinctive frontend interface for this task.

Workflow:
1. Understand the context: what problem does this interface solve? Who uses it?
2. Investigate existing UI: ei ask "show me the current UI for X" --project <alias>
3. Design: typography, color, layout, motion, spatial composition
4. Write the design doc with component architecture and styling specs
5. Include image generation prompts for prototype visuals

Storage: Save the design in FlickNote project `orientation`.
When done: return the FlickNote ID and a concise summary."""
extra_skills = ["frontend-design"]

[creator]
prompt = """Design new agent identities, define their roles, and manage respawn updates across the team.

Coordinate with eve when creating or modifying agent identities."""

[test_planner]
prompt = """Write an integration test plan using sp-write-test-plan methodology. Store it in FlickNote project `orientation` and return the note ID. Record confirmed-broken behavior in the same note; do not create tasks automatically."""
extra_skills = ["sp-write-test-plan"]
