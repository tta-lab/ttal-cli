#:schema https://ttal.guion.io/schema/config.schema.json

shell = "zsh"

[flicknote]
  inline_projects = ["plan", "fix"]

[sync]
  global_prompt_path = "/Users/neil/Code/guion-opensource/ttal-cli/templates/ttal/CLAUDE.user.md"
  skills_paths = ["../docs/skills"]
  subagents_paths = ["../docs/agents"]
  commands_paths = ["../docs/commands"]

[voice]
  vocabulary = ["session", "claude", "codex", "opencode", "worker", "tmux",
    "taskwarrior", "flicknote"]

[teams.ttal]
  chat_id = "YOUR_TELEGRAM_CHAT_ID"  # Get from @userinfobot on Telegram
  team_path = "/Users/neil/Code/guion-opensource/ttal-cli/templates/ttal"
  data_dir = "~/.ttal"
  taskrc = "~/.taskrc"
  voice_language = "en"
  worker_runtime = "claude-code"
  agent_model = "opus"
  worker_model = "sonnet"
  emoji_reactions = true
  # notification_token_env = "KESTREL_BOT_TOKEN"
  # merge_mode = "squash"
