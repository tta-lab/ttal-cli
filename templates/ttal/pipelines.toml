# Pipeline definitions for ttal task advance.
# Each pipeline defines a sequence of stages with role-based assignment and gates.
# Tasks are matched to pipelines by their tags.
# Skills are role-based via roles.toml (default_skills + extra_skills); applied unconditionally.

[standard]
description = "Plan → Implement"
tags = ["feature", "refactor"]

[[standard.stages]]
name = "Plan"
assignee = "designer"
emoji = "🧭"
gate = "human"
reviewer = "plan-review-lead"

[[standard.stages]]
name = "Implement"
assignee = "coder"
worker = true
emoji = "⚙️"
gate = "auto"
reviewer = "pr-review-lead"

[bugfix]
description = "Fix → Implement"
tags = ["bugfix"]

[[bugfix.stages]]
name = "Fix"
assignee = "fixer"
emoji = "🔧"
gate = "human"
reviewer = "plan-review-lead"

[[bugfix.stages]]
name = "Implement"
assignee = "coder"
worker = true
emoji = "⚙️"
gate = "auto"
reviewer = "pr-review-lead"

[hotfix]
description = "Straight to implement"
tags = ["hotfix"]

[[hotfix.stages]]
name = "Implement"
assignee = "coder"
worker = true
emoji = "⚙️"
gate = "auto"
reviewer = "pr-review-lead"


