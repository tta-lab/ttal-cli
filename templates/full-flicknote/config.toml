#:schema https://ttal.guion.io/schema/config.schema.json

references_path = "~/code/references"

[sync]
  worker_agent_paths = ["./docs/agents"]

[teams.default]
  team_path = ""                     # Path to your workspace directory
  data_dir = "~/.ttal"
  taskrc = "~/.taskrc"
  voice_language = "en"
  default_runtime = "claude-code"
  agent_model = "sonnet"
  worker_model = "sonnet"
  emoji_reactions = true
  # notification_token_env = "DEFAULT_NOTIFICATION_BOT_TOKEN"
  # merge_mode = "auto"
