pre-commit:
  parallel: true
  jobs:
    - name: fmt check
      glob: "*.go"
      run: gofmt -w -s . && git diff --exit-code --quiet -- '*.go'

    - name: vet
      glob: "*.go"
      run: GOCACHE=~/.ttal/go-build TMPDIR=~/.ttal/tmp go vet ./...

    - name: lint
      glob: "*.go"
      run: GOCACHE=~/.ttal/go-build TMPDIR=~/.ttal/tmp golangci-lint run ./...
