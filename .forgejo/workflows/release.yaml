name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: make test

      - name: Build binaries for multiple platforms
        run: |
          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -o ttal-linux-amd64 .

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -o ttal-linux-arm64 .

          # macOS AMD64
          GOOS=darwin GOARCH=amd64 go build -o ttal-darwin-amd64 .

          # macOS ARM64
          GOOS=darwin GOARCH=arm64 go build -o ttal-darwin-arm64 .

          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build -o ttal-windows-amd64.exe .

      - name: Create checksums
        run: |
          sha256sum ttal-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ttal-linux-amd64
            ttal-linux-arm64
            ttal-darwin-amd64
            ttal-darwin-arm64
            ttal-windows-amd64.exe
            checksums.txt
