name: PR

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Format
        run: |
          make fmt
          if [ -n "$(git status --porcelain)" ]; then
            echo "Code not formatted. Run 'make fmt' and commit the changes."
            git status --porcelain
            exit 1
          fi

      - name: Generate ent code
        run: make generate

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files are out of date. Run 'make generate' and commit the changes."
            git status --porcelain
            exit 1
          fi

      - name: Vet
        run: make vet

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7
          args: --timeout=5m

      - name: Test
        run: make test

      - name: Build
        run: make build
