name: Build Container Images
on:
  push:
    paths:
      - 'containers/**'
    branches: [main]
  workflow_dispatch:
    inputs:
      dirs:
        description: 'JSON array of container dirs to build (e.g. ["containers/base","containers/worker-go"]). Leave empty to build all.'
        required: false
        default: ''

permissions:
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.changed.outputs.dirs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.dirs }}" ]; then
            dirs='${{ inputs.dirs }}'
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            dirs=$(find containers -mindepth 1 -maxdepth 1 -type d | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            dirs=$(git diff --name-only HEAD~1 HEAD | grep '^containers/' | cut -d/ -f1-2 | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: ${{ needs.detect.outputs.dirs != '[]' && needs.detect.outputs.dirs != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: ${{ fromJson(needs.detect.outputs.dirs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v7
        with:
          version: "latest"
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        working-directory: ${{ matrix.dir }}
        run: dagger run go run main.go --push
