name: Build Container Images
on:
  push:
    paths:
      - 'containers/**'
    branches: [main]
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v7
        with:
          version: "latest"
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push base
        working-directory: containers/base
        run: dagger run go run main.go --push

  build-workers:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - containers/worker-go
          - containers/worker-node
          - containers/worker-rust
          - containers/worker-devops
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v7
        with:
          version: "latest"
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        working-directory: ${{ matrix.dir }}
        run: dagger run go run main.go --push
