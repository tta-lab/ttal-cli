name: PR

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Format
        run: |
          make fmt
          if [ -n "$(git status --porcelain)" ]; then
            echo "Code not formatted. Run 'make fmt' and commit the changes."
            git status --porcelain
            exit 1
          fi

      - name: Generate schema
        run: make schema

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files are out of date. Run 'make schema', then commit."
            git status --porcelain
            exit 1
          fi

      - name: Vet
        run: make vet

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          args: --timeout=5m

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install docs dependencies
        run: cd docs && pnpm install --frozen-lockfile

      - name: Build docs
        run: cd docs && pnpm build
