name: PR

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install qlty
        run: |
          curl -fsSL https://qlty.sh | bash -s -- --version 0.618.0
          echo "$HOME/.qlty/bin" >> $GITHUB_PATH

      - name: Lint and security scan
        run: qlty check --all --no-progress

      - name: Generate schema
        run: make schema

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files are out of date. Run 'make schema', then commit."
            git status --porcelain
            exit 1
          fi

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install docs dependencies
        run: cd docs && pnpm install --frozen-lockfile

      - name: Build docs
        run: cd docs && pnpm build
