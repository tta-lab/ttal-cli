version: "2"
run:
  allow-parallel-runners: true
  timeout: 5m

linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    # errcheck exclude-functions: centralised here instead of //nolint:errcheck
    # on every call site. Each entry was audited — see rationale below.
    #
    # SAFE — defer cleanup, nothing useful to do with the error:
    #   .Close() variants, os.Remove
    #
    # SAFE — test-only helpers:
    #   os.Mkdir, os.WriteFile
    #
    # BORDERLINE but OK in context:
    #   (*os/exec.Cmd).Run     — only launchctl bootout "unload-before-load" (3 sites)
    #   (net.Conn).Write       — socket.go:260 courtesy reply after handler ran
    #   (*os.File).WriteString — hook.go:263 taskwarrior JSON passthrough on stdout
    #   fmt.Fprintf            — hook.go:308 best-effort debug log line
    #   lipgloss.Print/Println/Fprintf — best-effort terminal rendering; TTY errors non-actionable
    #   (net.Conn).SetDeadline — only fails if conn already closed; next op catches it
    #
    # Important call sites that DO check errors (not excluded):
    #   socket.go:87,136  conn.Write (client-facing send)
    #   hook.go:60        conn.Write (daemon send)
    #   voice/client.go:69 cmd.Run   (ffmpeg)
    errcheck:
      exclude-functions:
        # defer cleanup — nothing to do with error
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (net.Conn).Close
        - (net.Listener).Close
        - (*github.com/fsnotify/fsnotify.Watcher).Close
        - (*os.File).Close
        - os.Remove
        # best-effort writes / commands (see rationale above)
        - (net.Conn).SetDeadline
        - (net.Conn).Write
        - (*os.File).WriteString
        - (*os/exec.Cmd).Run
        - fmt.Fprintf
        - charm.land/lipgloss/v2.Print
        - charm.land/lipgloss/v2.Println
        - charm.land/lipgloss/v2.Fprintf
        # test-only
        - os.Mkdir
        - os.WriteFile
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    gocyclo:
      min-complexity: 15
    lll:
      line-length: 120

  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
    rules:
      # SA5011: staticcheck doesn't model t.Fatal/t.Fatalf as control-flow
      # terminators (they call runtime.Goexit). The nil-check + t.Fatal pattern
      # is safe at runtime; suppress in test files to avoid false positives.
      - linters:
          - staticcheck
        text: "SA5011"
        path: "_test\\.go$"

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
