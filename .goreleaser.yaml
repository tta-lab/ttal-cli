version: 2
project_name: ttal

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    # Windows excluded: ttal requires tmux, launchd, and unix signals
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs"
      - "^test"
      - "^chore"

brews:
  - name: ttal
    commit_author:
      name: tta-lab-bot
      email: bot@tta-lab.com
    commit_msg_template: "feat(formula): update {{ .ProjectName }} to {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/tta-lab/ttal-cli"
    description: "Agent infrastructure CLI - manage tasks, send messages, coordinate agents"
    license: "MIT"
    install: |
      bin.install "ttal"
    test: |
      system "#{bin}/ttal", "version"
    repository:
      owner: tta-lab
      name: homebrew-ttal
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
