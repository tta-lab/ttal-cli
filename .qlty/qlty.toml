config_version = "0"

exclude_patterns = [
  "third_party/**",
  "docs/**",
]

test_patterns = [
  "**/*_test.go",
]

# Code smells — duplication + complexity detection
[smells]
mode = "comment"

[[source]]
name = "default"
default = true

# Go linting — wraps existing .golangci.yml (16 linters + gofmt/goimports)
# Pinned to 2.10.1 (built with Go 1.26.0) — qlty's default version was built
# with Go 1.23 which is too old for this project's go 1.26.1 requirement.
[[plugin]]
name = "golangci-lint"
version = "2.10.1"
mode = "block"

# Secret scanning — catches leaked API keys, bot tokens, credentials
[[plugin]]
name = "trufflehog"
mode = "block"

# Dependency vulnerability scanning (scans go.mod/go.sum)
[[plugin]]
name = "osv-scanner"
mode = "block"

# GitHub Actions workflow security auditing
[[plugin]]
name = "zizmor"
mode = "block"
